<section class="content-historico">
  <header>
    <div>
      <h1>Histórico de transações</h1>
      <p>Últimas movimentações</p>
    </div>

    <div class="content-historico--filter">
      <fa-icon [icon]="faFilter" />
    </div>
  </header>

  <article class="content-historico-item">
    <div class="content-historico-item--icon">
      <fa-icon [icon]="faCar" class="content-historico-item--icon-svg" />
    </div>
    <div class="content-historico-item--info">
      <strong>Uber</strong>
      <div>
        <p>Transporte</p>
        <p>Hoje</p>
      </div>
    </div>
    <p class="content-historico-item--valor">- R$32,00</p>
  </article>
</section>
